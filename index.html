<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum DeFi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Glows -->
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="glass-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">QUANTUM</div>
            <nav>
                <div class="nav-item active">Swap</div>
                <div class="nav-item">Lending</div>
                <div class="nav-item">Analytics</div>
            </nav>
        </aside>

        <!-- Main Workspace -->
        <main class="content">
            <header>
                <div class="search-bar">Search tokens...</div>
                <div class="user-profile">
                    <span class="balance">2.45 ETH</span>
                    <button class="wallet-pill">0x71...4a2</button>
                </div>
            </header>

            <div class="bento-grid">
                <!-- Main Swap Card -->
                <div class="card swap-card">
                    <div class="card-header">
                        <h3>Exchange</h3>
                        <span class="settings-icon">⚙️</span>
                    </div>
                    
                    <div class="input-group">
                        <input type="number" placeholder="0.0">
                        <button class="token-select">ETH</button>
                    </div>

                    <div class="swap-divider">
                        <div class="divider-line"></div>
                        <div class="swap-circle">↓</div>
                    </div>

                    <div class="input-group">
                        <input type="number" placeholder="0.0">
                        <button class="token-select">USDC</button>
                    </div>

                    <button class="action-btn">Connect & Swap</button>
                </div>

                <!-- Market Info Bento Item -->
                <div class="card mini-card">
                    <h4>Market Cap</h4>
                    <p class="value">$2.4B</p>
                    <span class="trend">+4.2%</span>
                </div>

                <!-- Gas Info Bento Item -->
                <div class="card mini-card">
                    <h4>Gas Fee</h4>
                    <p class="value">12 Gwei</p>
                    <span class="status">Fast</span>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
